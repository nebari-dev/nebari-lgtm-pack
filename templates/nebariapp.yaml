{{- if .Values.nebariapp.enabled }}
apiVersion: reconcilers.nebari.dev/v1
kind: NebariApp
metadata:
  name: {{ include "nebari-lgtm-pack.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-lgtm-pack.labels" . | nindent 4 }}
spec:
  hostname: {{ required "nebariapp.hostname is required when nebariapp.enabled is true" .Values.nebariapp.hostname }}
  service:
    name: {{ .Values.nebariapp.service.name | default (printf "%s-grafana" .Release.Name) }}
    port: {{ .Values.nebariapp.service.port | default 80 }}
  {{- with .Values.nebariapp.routing }}
  routing:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.nebariapp.auth }}
  auth:
    enabled: {{ .enabled | default true }}
    provider: {{ .provider | default "keycloak" }}
    provisionClient: {{ .provisionClient | default true }}
    enforceAtGateway: {{ .enforceAtGateway | default false }}
    redirectURI: {{ .redirectURI | default "/login/generic_oauth" }}
    {{- with .clientSecretRef }}
    clientSecretRef: {{ . }}
    {{- end }}
    {{- with .scopes }}
    scopes:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .groups }}
    groups:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- if or .groups .keycloakConfig }}
    keycloakConfig:
      {{- /* Build groups list: start with explicit keycloakConfig.groups, then add any from auth.groups not already defined */}}
      {{- $kcGroups := list }}
      {{- $definedNames := list }}
      {{- with .keycloakConfig }}
        {{- range .groups }}
          {{- $kcGroups = append $kcGroups . }}
          {{- $definedNames = append $definedNames .name }}
        {{- end }}
      {{- end }}
      {{- range .groups }}
        {{- if not (has . $definedNames) }}
          {{- $kcGroups = append $kcGroups (dict "name" .) }}
        {{- end }}
      {{- end }}
      {{- if $kcGroups }}
      groups:
        {{- toYaml $kcGroups | nindent 8 }}
      {{- end }}
      {{- /* Auto-inject group-membership protocolMapper when groups are configured */}}
      {{- $mappers := list }}
      {{- with .keycloakConfig }}
        {{- with .protocolMappers }}
          {{- $mappers = . }}
        {{- end }}
      {{- end }}
      {{- if and .groups (not $mappers) }}
      protocolMappers:
        - name: group-membership
          protocolMapper: oidc-group-membership-mapper
          config:
            claim.name: groups
            full.path: "false"
            id.token.claim: "true"
            access.token.claim: "true"
            userinfo.token.claim: "true"
      {{- else if $mappers }}
      protocolMappers:
        {{- toYaml $mappers | nindent 8 }}
      {{- end }}
    {{- end }}
  {{- end }}
  {{- with .Values.nebariapp.landingPage }}
  landingPage:
    enabled: {{ .enabled | default false }}
    {{- with .displayName }}
    displayName: {{ . | quote }}
    {{- end }}
    {{- with .description }}
    description: {{ . | quote }}
    {{- end }}
    {{- with .icon }}
    icon: {{ . | quote }}
    {{- end }}
    {{- with .category }}
    category: {{ . | quote }}
    {{- end }}
    {{- with .priority }}
    priority: {{ . }}
    {{- end }}
    {{- with .externalUrl }}
    externalUrl: {{ . | quote }}
    {{- end }}
    {{- with .healthCheck }}
    healthCheck:
      enabled: {{ .enabled | default false }}
      {{- with .path }}
      path: {{ . | quote }}
      {{- end }}
      {{- with .intervalSeconds }}
      intervalSeconds: {{ . }}
      {{- end }}
      {{- with .timeoutSeconds }}
      timeoutSeconds: {{ . }}
      {{- end }}
    {{- end }}
  {{- end }}
  {{- with .Values.nebariapp.additionalServices }}
  additionalServices:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
