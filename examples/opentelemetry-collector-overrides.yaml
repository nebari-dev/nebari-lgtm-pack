# OpenTelemetry Collector overrides — REFERENCE ONLY.
#
# This chart renders the equivalent ConfigMap automatically as
# `opentelemetry-collector-overrides` in the `monitoring` namespace. NIC's
# OTel collector mounts that ConfigMap as an additional --config file and
# deep-merges it with the base config at startup. You do NOT need to copy
# this file into your GitOps repo.
#
# This file is kept as a standalone reference of what gets merged. The
# top-level key here is `config:` to match the upstream OTel collector
# Helm chart's values structure (one level above what's actually placed
# in the ConfigMap). In the auto-applied version, this same content is the
# value of `data.relay.yaml` in the override ConfigMap, and endpoints use
# {{ .Release.Name }}-{loki,tempo,mimir} rather than the hard-coded
# "lgtm-pack-" prefix shown here.
config:
  exporters:
    otlphttp/loki:
      endpoint: http://lgtm-pack-loki:3100/otlp
      tls:
        insecure: true
    otlp/tempo:
      endpoint: http://lgtm-pack-tempo:4317
      tls:
        insecure: true
    otlphttp/mimir:
      endpoint: http://lgtm-pack-mimir-gateway/otlp
      tls:
        insecure: true
  service:
    pipelines:
      logs:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [otlphttp/loki]
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [otlp/tempo]
      metrics:
        receivers: [otlp, prometheus]
        processors: [memory_limiter, batch]
        exporters: [otlphttp/mimir]
