name: Test Deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Create k3d cluster
        run: k3d cluster create test --wait

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Update Helm dependencies
        run: helm dependency update

      - name: Stage stub OTel collector (mimics NIC)
        run: |
          set -e
          kubectl create namespace monitoring
          # Stub ConfigMap with default debug-exporter relay (same shape as
          # the OTel chart renders). This is what NIC would put in place.
          cat <<'EOF' | kubectl apply -f -
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: opentelemetry-collector-opentelemetry-collector-agent
            namespace: monitoring
          data:
            relay: |
              exporters:
                debug: {}
              receivers:
                otlp:
                  protocols:
                    grpc:
                      endpoint: 0.0.0.0:4317
                prometheus: {}
              processors:
                batch: {}
                memory_limiter:
                  check_interval: 5s
                  limit_percentage: 80
              service:
                pipelines:
                  logs:    { receivers: [otlp],             processors: [memory_limiter, batch], exporters: [debug] }
                  traces:  { receivers: [otlp],             processors: [memory_limiter, batch], exporters: [debug] }
                  metrics: { receivers: [otlp, prometheus], processors: [memory_limiter, batch], exporters: [debug] }
          EOF
          # Stub DaemonSet so the Job's `rollout restart` and `rollout status`
          # have something to act on. Uses pause image (tiny, always available).
          cat <<'EOF' | kubectl apply -f -
          apiVersion: apps/v1
          kind: DaemonSet
          metadata:
            name: opentelemetry-collector-opentelemetry-collector-agent
            namespace: monitoring
          spec:
            selector:
              matchLabels:
                app: stub-otel
            template:
              metadata:
                labels:
                  app: stub-otel
              spec:
                containers:
                  - name: pause
                    image: registry.k8s.io/pause:3.9
          EOF
          kubectl -n monitoring rollout status daemonset/opentelemetry-collector-opentelemetry-collector-agent --timeout=2m

      - name: Deploy chart
        run: |
          helm install lgtm-pack . --namespace default \
            --set nebariapp.enabled=false \
            --set grafana.envFromConfigMaps=null \
            --set grafana.envValueFrom=null \
            --set otelCollectorOverrides.enabled=true \
            --timeout 10m

      - name: Verify OTel collector ConfigMap was patched
        run: |
          set -e
          echo "=== ConfigMap annotations ==="
          kubectl -n monitoring get cm opentelemetry-collector-opentelemetry-collector-agent \
            -o jsonpath='{.metadata.annotations}' | tee /tmp/annotations.json
          echo
          grep -q '"nic.nebari.dev/managed-by":"lgtm-pack"' /tmp/annotations.json

          echo "=== Merged data.relay ==="
          kubectl -n monitoring get cm opentelemetry-collector-opentelemetry-collector-agent \
            -o jsonpath='{.data.relay}' | tee /tmp/relay.yaml
          echo

          # All three exporter endpoints present, derived from release name "lgtm-pack"
          grep -q 'http://lgtm-pack-loki:3100/otlp' /tmp/relay.yaml
          grep -q 'http://lgtm-pack-tempo:4317' /tmp/relay.yaml
          grep -q 'http://lgtm-pack-mimir-gateway/otlp' /tmp/relay.yaml

          # NIC's receivers / processors preserved (merge, not replace)
          grep -q 'memory_limiter:' /tmp/relay.yaml
          grep -q 'prometheus:' /tmp/relay.yaml

      - name: Dump patch Job logs on failure
        if: failure()
        run: |
          echo "=== Patch Job pods ==="
          kubectl -n monitoring get pods -l app.kubernetes.io/component=otel-patcher
          echo "=== Patch Job logs ==="
          kubectl -n monitoring logs -l app.kubernetes.io/component=otel-patcher --tail=200 || true

      - name: Wait for Grafana
        run: |
          for i in {1..60}; do
            echo "=== Attempt $i/60 ==="
            kubectl get pods
            if kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=grafana --timeout=5s 2>/dev/null; then
              echo "Grafana pod ready!"
              exit 0
            fi
            sleep 5
          done
          echo "Timeout waiting for Grafana"
          exit 1

      - name: Test Grafana health endpoint
        run: |
          kubectl port-forward svc/lgtm-pack-grafana 3000:80 &
          PF_PID=$!
          sleep 5
          echo "=== Grafana health check ==="
          curl -sS http://localhost:3000/api/health
          echo ""
          curl -sS http://localhost:3000/api/health | grep -q '"database": "ok"'
          RESULT=$?
          kill $PF_PID 2>/dev/null || true
          exit $RESULT

      - name: Test datasource provisioning
        run: |
          kubectl port-forward svc/lgtm-pack-grafana 3000:80 &
          PF_PID=$!
          sleep 5
          echo "=== Checking datasources ==="
          curl -sS -u admin:admin http://localhost:3000/api/datasources
          echo ""
          # Verify Loki datasource exists
          curl -sS -u admin:admin http://localhost:3000/api/datasources | grep -q '"name":"Loki"'
          RESULT=$?
          kill $PF_PID 2>/dev/null || true
          exit $RESULT

      - name: Test Loki log push and query
        run: |
          kubectl port-forward svc/lgtm-pack-loki 3100:3100 &
          PF_PID=$!
          sleep 5
          # Push a test log entry
          echo "=== Pushing test log ==="
          curl -sS -X POST http://localhost:3100/loki/api/v1/push \
            -H "Content-Type: application/json" \
            -d '{"streams":[{"stream":{"job":"ci-test"},"values":[["'$(date +%s)000000000'","hello from CI"]]}]}'
          echo ""
          # Query for it
          echo "=== Querying Loki ==="
          sleep 2
          curl -sS 'http://localhost:3100/loki/api/v1/query?query={job="ci-test"}'
          echo ""
          kill $PF_PID 2>/dev/null || true

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== Grafana logs ==="
          kubectl logs -l app.kubernetes.io/name=grafana --tail=100 2>/dev/null || true
          echo "=== Loki logs ==="
          kubectl logs -l app.kubernetes.io/name=loki --tail=100 2>/dev/null || true
          echo "=== Tempo logs ==="
          kubectl logs -l app.kubernetes.io/name=tempo --tail=100 2>/dev/null || true
          echo "=== Mimir logs ==="
          kubectl logs -l app.kubernetes.io/name=mimir --tail=100 2>/dev/null || true
          echo "=== All pods ==="
          kubectl get pods -o wide
          echo "=== Events ==="
          kubectl get events --sort-by=.lastTimestamp
