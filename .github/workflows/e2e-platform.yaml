name: E2E Platform Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A full platform + LGTM stack is heavy; only one run at a time per ref.
concurrency:
  group: e2e-platform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

      - name: Install Helm
        run: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Vendor chart dependencies
        run: helm dependency update chart

      # Building NIC from source (non-release nic-version below) needs Go.
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.5.0
        with:
          go-version: "1.25"

      - name: Bootstrap Nebari platform
        id: sandbox
        uses: nebari-dev/action-nebari-sandbox@09f542cdbcb0ed74307f86fee4f8ad0053a4cd8f  # v2.0.2
        with:
          profile: platform
          # TEMPORARY: build NIC from its main branch instead of a release.
          #
          # This pack's collector override (the opentelemetry-collector-overrides
          # ConfigMap) only takes effect on NIC that includes the software-pack
          # extension point + collector scrape RBAC from
          # https://github.com/nebari-dev/nebari-infrastructure-core/pull/331
          # (merged 2026-06-17). That is NOT in the latest NIC release (v0.6.0,
          # 2026-06-01): on it the override is ignored and telemetry goes to the
          # collector's debug exporter, so the telemetry checks below cannot pass.
          #
          # We'd prefer to pin a specific main commit for reproducibility, but
          # the sandbox action builds source refs via `git clone --branch=<ref>`,
          # which only accepts a branch/tag name — not a bare commit SHA. So we
          # track `main` until a NIC release carries #331.
          #
          # ACTION ITEM before merging this PR: switch back to a released
          # nic-version (drop this and the Go setup step above) once a NIC
          # release includes #331. Tracked in the PR description.
          nic-version: main

      - name: Surface KUBECONFIG for sub-action wait + verification
        run: echo "KUBECONFIG=${{ steps.sandbox.outputs.kubeconfig }}" >> "$GITHUB_ENV"

      - name: Install lgtm-pack via GitOps
        uses: nebari-dev/action-nebari-sandbox/add-software-pack@09f542cdbcb0ed74307f86fee4f8ad0053a4cd8f  # v2.0.2
        with:
          gitops-dir:           ${{ steps.sandbox.outputs.gitops-dir }}
          app-name:             nebari-lgtm-pack
          chart-source:         ./chart
          application-manifest: ./tests/e2e/lgtm-application.yaml
          wait-timeout:         15m

      - name: Run LGTM e2e verification suite
        run: ./tests/e2e/run.sh

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "=== ArgoCD applications ==="
          kubectl get applications -n argocd || true
          echo "=== lgtm-pack Application detail ==="
          kubectl get application/nebari-lgtm-pack -n argocd -o yaml || true
          echo "=== Pods (lgtm) ==="
          kubectl get pods -n lgtm -o wide || true
          echo "=== Pods (monitoring) ==="
          kubectl get pods -n monitoring -o wide || true
          echo "=== Services (monitoring) ==="
          kubectl get svc -n monitoring -o wide || true
          echo "=== Services (lgtm) ==="
          kubectl get svc -n lgtm -o wide || true
          echo "=== OTel collector override CM ==="
          kubectl get cm opentelemetry-collector-overrides -n monitoring -o yaml || true
          echo "=== OTel collector logs ==="
          kubectl logs -n monitoring daemonset/opentelemetry-collector-agent --tail=200 || true
          echo "=== Grafana logs ==="
          kubectl logs -n lgtm -l app.kubernetes.io/name=grafana --tail=100 || true
          echo "=== Events (lgtm) ==="
          kubectl get events -n lgtm --sort-by=.lastTimestamp || true

      - name: Cleanup
        if: always()
        run: k3d cluster delete ${{ steps.sandbox.outputs.cluster-name }} || true
