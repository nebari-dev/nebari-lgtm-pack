name: Release Chart

on:
  push:
    branches: [main]
    paths:
      - 'chart/Chart.yaml'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          fetch-depth: 0

      - name: Install Helm
        run: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Get chart version
        id: chart
        run: |
          echo "version=$(grep '^version:' chart/Chart.yaml | awk '{print $2}')" >> $GITHUB_OUTPUT
          echo "name=$(grep '^name:' chart/Chart.yaml | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Check if release exists
        id: check
        run: |
          if gh release view "${{ steps.chart.outputs.name }}-${{ steps.chart.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Helm dependencies
        if: steps.check.outputs.exists == 'false'
        run: helm dependency update chart

      - name: Package chart
        if: steps.check.outputs.exists == 'false'
        run: helm package chart

      # Publishing a GitHub release fires the `release: published` event, which
      # the "Sync Helm Chart" workflow consumes to open a PR against
      # nebari-dev/helm-repository. That repository packages, indexes (with
      # `helm repo index --merge`, preserving every prior version), and
      # publishes the chart. This repo therefore no longer maintains its own
      # gh-pages Helm index — which is what previously collapsed the index to a
      # single version on every release.
      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        run: |
          gh release create "${{ steps.chart.outputs.name }}-${{ steps.chart.outputs.version }}" \
            --title "${{ steps.chart.outputs.name }}-${{ steps.chart.outputs.version }}" \
            --generate-notes \
            *.tgz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
